/* ============ HOOKS ============ */

function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.unobserve(el); } },
      { threshold: 0.15 }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, className = "" }) {
  const [ref, visible] = useReveal();
  return <div ref={ref} className={`reveal ${visible ? "is-visible" : ""} ${className}`}>{children}</div>;
}

/* ============ NAV ============ */

function TopNav() {
  const [active, setActive] = useState("about");
  const sections = ["about", "skills", "projects", "journey", "contact"];

  useEffect(() => {
    const obs = new IntersectionObserver(
      (entries) => {
        entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); });
      },
      { rootMargin: "-45% 0px -50% 0px", threshold: 0 }
    );
    sections.forEach((id) => {
      const el = document.getElementById(id);
      if (el) obs.observe(el);
    });
    return () => obs.disconnect();
  }, []);

  const go = (id) => (e) => {
    e.preventDefault();
    document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "start" });
  };

  return (
    <nav className="topnav">
      <div className="inner">
        <a href="#top" className="brand" onClick={go("top")}>{PROFILE.name}<span>.</span></a>
        <ul className="nav-links">
          {sections.map((id) => (
            <li key={id}>
              <a href={`#${id}`} className={active === id ? "active" : ""} onClick={go(id)}>
                {id}
              </a>
            </li>
          ))}
        </ul>
      </div>
    </nav>
  );
}

function Typewriter({ words }) {
  const [text, setText] = useState("");
  const [wordIdx, setWordIdx] = useState(0);
  const [deleting, setDeleting] = useState(false);

  useEffect(() => {
    const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    if (reduced) {
      setText(words[wordIdx % words.length]);
      const t = setTimeout(() => setWordIdx((i) => i + 1), 1500);
      return () => clearTimeout(t);
    }

    const current = words[wordIdx % words.length];

    const speed = deleting ? 35 : 65;
    const pause = 1400;

    const t = setTimeout(() => {
      if (!deleting) {
        const next = current.slice(0, text.length + 1);
        setText(next);
        if (next === current) setTimeout(() => setDeleting(true), pause);
      } else {
        const next = current.slice(0, text.length - 1);
        setText(next);
        if (next === "") { setDeleting(false); setWordIdx((i) => i + 1); }
      }
    }, speed);
    return () => clearTimeout(t);
  }, [text, deleting, wordIdx, words]);

  return <span className="typed-word">{text}<span className="cursor">&nbsp;</span></span>;
}

function Trace() {
  const [ref, visible] = useReveal();
  const nodes = [
    { x: 40, label: "NET" },
    { x: 280, label: "AI" },
    { x: 520, label: "DB" },
    { x: 760, label: "WEB" },
  ];
  return (
    <div className="trace" ref={ref}>
      <svg viewBox="0 0 800 60" preserveAspectRatio="xMinYMid meet">
        <path className="trace-line" d="M40,30 L280,30 L520,30 L760,30" />
        <path className={`trace-line-draw ${visible ? "drawn" : ""}`} d="M40,30 L280,30 L520,30 L760,30" />
        {nodes.map((n, i) => (
          <g key={n.label} className={`trace-node ${visible ? "lit" : ""}`} style={{ transitionDelay: `${i * 220 + 300}ms` }}>
            <circle cx={n.x} cy="30" r="7" />
            <text x={n.x} y="52" textAnchor="middle">{n.label}</text>
          </g>
        ))}
      </svg>
    </div>
  );
}
